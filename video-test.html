<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny End-Screen Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #2a2a3a;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f1a3a;
            margin-bottom: 12px;
            text-align: center;
        }

        .note {
            font-size: 15px;
            color: #5a5a6a;
            margin-bottom: 32px;
            text-align: center;
        }

        .video-container {
            width: 100%;
            max-width: 960px;
            border: 2px solid #C9A227;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(15, 26, 58, 0.15);
            overflow: hidden;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .note {
                font-size: 14px;
            }

            body {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <h1>Bunny End-Screen Test</h1>
    <p class="note">When the video finishes, it should return to the opening frame and remain paused.</p>

    <div class="video-container">
        <div class="video-wrapper">
            <iframe
                id="bunny-end-test-player"
                title="FICA Tip Credit end-screen behavior test"
                src="https://player.mediadelivery.net/embed/702299/63eb774a-f192-43ce-bfbc-27488ac8d547?autoplay=false&loop=false&muted=false&preload=false&responsive=true"
                loading="lazy"
                style="border: 0; position: absolute; top: 0; left: 0; height: 100%; width: 100%;"
                allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;fullscreen;"
                allowfullscreen="true">
            </iframe>
        </div>
    </div>

    <script
        type="text/javascript"
        src="https://assets.mediadelivery.net/playerjs/playerjs-latest.min.js">
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const iframe = document.getElementById("bunny-end-test-player");

            if (!iframe || !window.playerjs) {
                return;
            }

            const player = new playerjs.Player(iframe);

            player.on("ready", function () {
                const supportsEnded = player.supports("event", "ended");
                const supportsSeek = player.supports("method", "setCurrentTime");
                const supportsPause = player.supports("method", "pause");

                if (supportsEnded && supportsSeek && supportsPause) {
                    player.on("ended", function () {
                        player.setCurrentTime(0);

                        window.setTimeout(function () {
                            player.pause();
                        }, 100);
                    });
                }
            });
        });
    </script>
</body>
</html>
